name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            platform: windows/amd64

          - name: macOS
            os: macos-latest
            platform: darwin/universal

          - name: Linux
            os: ubuntu-latest
            platform: linux/amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # ── Platform deps ──────────────────────────────────────────────────────

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            dpkg-dev

      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install nsis --no-progress -y

      # ── Build ──────────────────────────────────────────────────────────────

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build — Windows (portable + installer)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          wails build -platform ${{ matrix.platform }} -clean
          wails build -platform ${{ matrix.platform }} -nsis -clean
          mv build/bin/mash-potato.exe        "build/bin/mash-potato-${VERSION}-windows-amd64.exe"
          mv build/bin/mash-potato-amd64-installer.exe \
                                               "build/bin/mash-potato-${VERSION}-windows-amd64-setup.exe"

      - name: Build — macOS
        if: matrix.os == 'macos-latest'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          wails build -platform ${{ matrix.platform }} -clean
          # Package as DMG (hdiutil is available natively on macOS)
          hdiutil create \
            -volname "Mash Potato" \
            -srcfolder "build/bin/mash-potato.app" \
            -ov -format UDZO \
            "build/bin/mash-potato-${VERSION}-macos-universal.dmg"
          # Also keep the raw .app in a zip for users who prefer it
          cd build/bin
          zip -r "mash-potato-${VERSION}-macos-universal.zip" "mash-potato.app"

      - name: Build — Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          wails build -platform ${{ matrix.platform }} -clean

          # Portable tarball
          tar -czf "build/bin/mash-potato-${VERSION}-linux-amd64.tar.gz" \
            -C build/bin mash-potato

          # .deb package
          DEB_ROOT="$(mktemp -d)/mash-potato_${VERSION}_amd64"
          install -Dm755 build/bin/mash-potato          "${DEB_ROOT}/usr/local/bin/mash-potato"
          install -Dm644 build/appicon.png               "${DEB_ROOT}/usr/share/pixmaps/mash-potato.png"
          mkdir -p "${DEB_ROOT}/usr/share/applications"
          cat > "${DEB_ROOT}/usr/share/applications/mash-potato.desktop" <<EOF
          [Desktop Entry]
          Version=1.0
          Name=Mash Potato
          Comment=Desktop API client
          Exec=/usr/local/bin/mash-potato
          Icon=mash-potato
          Terminal=false
          Type=Application
          Categories=Development;Utility;
          EOF
          mkdir -p "${DEB_ROOT}/DEBIAN"
          cat > "${DEB_ROOT}/DEBIAN/control" <<EOF
          Package: mash-potato
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: mash-potato
          Description: Postman-like desktop API client
           A native desktop HTTP client built with Wails and React.
          EOF
          dpkg-deb --build "${DEB_ROOT}" \
            "build/bin/mash-potato-${VERSION}-linux-amd64.deb"

      # ── Upload artifacts for the next job ─────────────────────────────────

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            build/bin/*.exe
            build/bin/*.dmg
            build/bin/*.zip
            build/bin/*.tar.gz
            build/bin/*.deb
          retention-days: 1
          if-no-files-found: error

  # ── Publish GitHub Release ─────────────────────────────────────────────────

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
