name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend type check + build
        working-directory: frontend
        run: npm run build

      - name: Frontend tests
        working-directory: frontend
        run: npm run test

      - name: Go vet
        run: go vet ./...

      - name: Go tests
        run: go test ./...
