openapi: "3.0.3"
info:
  title: Bookstore API
  version: "1.0.0"
servers:
  - url: https://api.bookstore.example.com/v1
paths:
  /books:
    get:
      operationId: listBooks
      tags:
        - books
      summary: List all books
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          example: 10
        - name: offset
          in: query
          required: true
          schema:
            type: integer
        - name: X-Request-ID
          in: header
          required: true
          schema:
            type: string
          example: abc-123
      security:
        - bearerAuth: []
      responses:
        "200":
          description: A list of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      operationId: createBook
      tags:
        - books
      summary: Create a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                author:
                  type: string
                year:
                  type: integer
                inStock:
                  type: boolean
            example:
              title: "The Great Gatsby"
              author: "F. Scott Fitzgerald"
              year: 1925
              inStock: true
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Book created
  /books/{bookId}:
    get:
      operationId: getBook
      tags:
        - books
      summary: Get a specific book
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
      security:
        - apiKeyAuth: []
      responses:
        "200":
          description: A single book
        "404":
          description: Book not found
    delete:
      operationId: deleteBook
      tags:
        - books
      summary: Delete a book
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Book deleted
  /authors:
    get:
      operationId: listAuthors
      tags:
        - authors
      summary: List all authors
      security:
        - basicAuth: []
      responses:
        "200":
          description: A list of authors
  /health:
    get:
      operationId: healthCheck
      summary: Health check (no tag)
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    basicAuth:
      type: http
      scheme: basic
